<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#6F8FAF">
    <title>PoltroConfort - Premium Links</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { color-scheme: light; }
        
        html, body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top,#8FAECC 0%,#6F8FAF 45%,#5f7f9e 100%);
            color: #ffffff !important;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* --- CSS DO BANNER (ÚNICO E SEM CONFLITOS) --- */
        #browser-warning {
            display: none; /* Escondido por padrão */
            background-color: #ff4444;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            border-bottom: 3px solid #cc0000;
            position: relative;
            z-index: 99999;
            width: 100%;
        }

        /* Só mostra se o JS confirmar que é Samsung */
        html.is-samsung #browser-warning {
            display: block !important;
        }

        /* Se o sistema estiver em modo CLARO, esconde (opcional) */
        @media (prefers-color-scheme: light) {
            html.is-samsung #browser-warning {
                display: none !important;
            }
        }

        #browser-warning button {
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 8px;
            background: white;
            color: #ff4444;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        /* --- SEUS ESTILOS DE DESIGN --- */
        .neomorph-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius:18px;
            border:1px solid rgba(255,255,255,0.12);
            box-shadow: 0 15px 35px rgba(0,0,0,0.35);
            transition: all 0.25s ease;
        }
        .neomorph-card:hover { transform:translateY(-4px); }

        .gold-border-container { position: relative; display: inline-block; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .gold-border-glow {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, #FCD34D, #F59E0B, #FCD34D);
            opacity: 0.45;
            filter: blur(2px);
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }
        
        .card-image-container {
            width: 75px; height: 75px; border-radius: 50%; overflow: hidden;
            background:#5f7f9e; border: 2px solid rgba(255,255,255,0.15);
            display:flex; align-items:center; justify-content:center;
        }
    </style>
</head>
<body>

    <div id="browser-warning">
        ⚠️ O Modo Escuro do Samsung Browser pode alterar as cores deste site.
        <br>
        <button id="open-chrome">ABRIR NO CHROME</button>
        <button onclick="document.getElementById('browser-warning').remove()" style="background:transparent; color:white; border:1px solid white; margin-left:10px;">IGNORAR</button>
    </div>

    <main class="min-h-screen flex flex-col items-center py-12 px-4 w-full max-w-md mx-auto">
        
        <div class="flex flex-col items-center mb-10 text-center">
            <div class="gold-border-container mb-6">
                <div class="gold-border-glow"></div>
                <div class="relative w-32 h-32 rounded-full p-1 bg-gradient-to-br from-yellow-200 to-yellow-600 z-10">
                    <img src="LOGO1.svg" alt="Logo" class="w-full h-full rounded-full object-contain bg-[#0b2545] border-4 border-[#0b2545]">
                </div>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">PoltroConfort</h1>
            <p class="text-blue-100 text-sm uppercase tracking-widest">Poltronas Pós-Cirúrgicas</p>
        </div>

        <div class="w-full flex flex-col gap-4">
            <a href="https://drive.google.com/file/d/164zV9mikjHZOUelz2gE0c1NYY7EdO17B/preview" class="neomorph-card p-4 flex items-center justify-between">
                <div class="flex-1 pr-4">
                    <h2 class="text-white font-bold text-lg">BOOK DE APRESENTAÇÃO</h2>
                    <span class="text-sm text-gray-200">Conheça a PoltroConfort</span>
                </div>
                <div class="card-image-container"><img src="LOGO1.svg" class="w-10"></div>
            </a>

            <a href="https://wa.me/551193664937" class="neomorph-card p-4 flex items-center justify-between">
                <div class="flex-1 pr-4">
                    <h2 class="text-white font-bold text-lg">FALE COM UM ESPECIALISTA</h2>
                    <span class="text-sm text-gray-200">WhatsApp</span>
                </div>
                <div class="card-image-container"><img src="iconewpp.png" class="w-full"></div>
            </a>
        </div>

       <footer class="mt-12 text-center">

	<p class="text-sm text-blue-200 mb-2">
	© PoltroConfort
	</p>

	<p class="text-xs text-blue-100 opacity-70">
	Experiência e conforto no pós-operatório
	</p>

	<p class="text-xs mt-2 opacity-60">
	Produzido por
	<a href="https://wa.me/5511959914018" 	class="underline">
	AdHAUSS
		</a>
            </p>
        </footer>
    </main>

    <script>
        (function() {
            // Detecta se é Samsung Browser
            var isSamsung = /SamsungBrowser/i.test(navigator.userAgent);
            
            if (isSamsung) {
                // Adiciona a classe que o CSS usa para mostrar o banner
                document.documentElement.classList.add('is-samsung');
                
                // Configura o botão do Chrome
                var btn = document.getElementById('open-chrome');
                if (btn) {
                    btn.onclick = function() {
                        var url = window.location.href.replace(/^https?:\/\//, "");
                        window.location.href = "intent://" + url + "#Intent;scheme=https;package=com.android.chrome;end";
                    };
                }
            }
        })();
    </script>
</body>
</html>
