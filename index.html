	/* Neomorphism Card Style */
        .neomorph-card {
	    position:relative;
            background: rgba(255,255,255,0.08);
	    backdrop-filter: blur(14px);
	    -webkit-backdrop-filter: blur(14px);
	    border-radius:18px;
	    border:1px solid rgba(255,255,255,0.12);

            box-shadow: 
                0 15px 35px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.05);

            
            transition: transform 0.25s ease, box-shadow 0.25s ease;
	    cursor: pointer;
	    overflow:hidden;
        }

        .neomorph-card:hover {
            transform:translateY(-4px) scale(1.01);
	    box-shadow:
	    0 20px 40px rgba(0,0,0,0.45);
        }

        .neomorph-card:active {
            transform: scale(0.97);
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.35);
        }

        /* Neomorphism Button/Icon Style */
        .neomorph-btn {
            background-color: #6F8FAF;
            box-shadow: 4px 4px 8px #5e7a95, -4px -4px 8px #80a4c9;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .neomorph-btn:hover {
            transform: translateY(-2px);
            color: #FCD34D; /* Yellow-300 */
        }

        /* Animated Golden Border */
        .gold-border-container {
            position: relative;
            display: inline-block;
	    animation: float 4s ease-in-out infinite;
	 }

     	   @keyframes float{
	   0%{ transform: translateY(0px);}
	   50%{ transform: translateY(-6px);}
	   100%{ transform: translateY(0px);}
        }

        .gold-border-glow {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: linear-gradient(45deg, #FCD34D, #F59E0B, #FCD34D);
            opacity: 0.45;
            filter: blur(2px);
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(1); }
        }
        
        @keyframes fadeUp {
   	    from {
        	opacity: 0;
       		transform: translateY(30px);
   	    }
   	    to {
       		opacity: 1;
        	transform: translateY(0);
   	    }
        }

        /* Utility for image placement */
        .card-image-container {

            width: 75px;

            border-radius: 50%;
            overflow: hidden;

	    background:#5f7f9e;

	    align-items:center;
	    justify-content:center;
        }
#chrome-recommendation {
position: fixed;

#chrome-recommendation button {

#chrome-recommendation button:hover{
opacity:.9;
}

#chrome-recommendation .close-btn{

font-size:18px;

opacity:.7;
}

@keyframes fadeUpBanner{
from{
opacity:0;
transform:translate(-50%,20px);
}
to{
opacity:1;
transform:translate(-50%,0);
}
}
    </style>

    <!-- Simple Animation Script -->
    <script>
     
document.addEventListener("DOMContentLoaded", function () {

function isSamsungBrowser(){
  return /SamsungBrowser/i.test(navigator.userAgent);
}

function samsungDarkModeAtivo(){

  const test = document.createElement("div");

  test.style.backgroundColor = "rgb(255,255,255)";
  test.style.color = "rgb(0,0,0)";
  test.style.position = "absolute";
  test.style.opacity = "0";
  test.style.pointerEvents = "none";

  document.body.appendChild(test);

  const style = window.getComputedStyle(test);

  const bg = style.backgroundColor;
  const color = style.color;

  document.body.removeChild(test);

  if(bg !== "rgb(255, 255, 255)" || color !== "rgb(0, 0, 0)"){
    return true;
  }

  return false;
}

if(isSamsungBrowser() && samsungDarkModeAtivo()){

  const banner = document.createElement("div");

  banner.style.position = "fixed";
  banner.style.bottom = "22px";
  banner.style.left = "50%";
  banner.style.transform = "translateX(-50%)";
  banner.style.background = "rgba(15,23,42,0.92)";
  banner.style.backdropFilter = "blur(14px)";
  banner.style.border = "1px solid rgba(255,255,255,0.15)";
  banner.style.padding = "16px 18px";
  banner.style.borderRadius = "16px";
  banner.style.color = "white";
  banner.style.fontSize = "14px";
  banner.style.display = "flex";
  banner.style.alignItems = "center";
  banner.style.gap = "14px";
  banner.style.boxShadow = "0 12px 35px rgba(0,0,0,0.45)";
  banner.style.zIndex = "9999";
  banner.style.maxWidth = "420px";
  banner.style.width = "calc(100% - 40px)";

  banner.innerHTML = `
  
  <div style="flex:1;line-height:1.3">
    <strong>Melhor visualização no Chrome</strong><br>
    <span style="font-size:12px;opacity:.8">
    O Samsung Browser altera as cores no modo escuro
    </span>
  </div>

  <button id="openChrome" style="
  background:#4285F4;
  border:none;
  padding:9px 16px;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
  ">
  Abrir
  </button>

  <span id="closeChromeBanner" style="
  cursor:pointer;
  font-size:18px;
  opacity:.6;
  ">
  ×
  </span>

  `;

  document.body.appendChild(banner);

  document.getElementById("closeChromeBanner").onclick=function(){
    banner.remove();
  };

  document.getElementById("openChrome").addEventListener("click", function () {

    const chromeIntent =
      "intent://" +
      window.location.href.replace(/^https?:\/\//, "") +
      "#Intent;scheme=https;package=com.android.chrome;end";

    window.location.href = chromeIntent;

  });

}

});
</script>
